<div class="auth-page-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="ultraball.png" alt="PokéTeam Logo" class="auth-logo" />
      <h2>Bem-vindo de volta!</h2>
      <p class="auth-subtitle">Entre na sua conta para acessar o Montador de Times e recursos avançados</p>
    </div>

    <form class="auth-form" (submit)="onSubmit(); $event.preventDefault()">
      <div *ngIf="errorMessage()" class="alert-box error">
        <i class="ph-bold ph-warning-circle"></i>
        <span>{{ errorMessage() }}</span>
      </div>

      <div class="form-group">
        <label for="login-input">E-mail ou Usuário</label>
        <div class="input-wrapper">
          <i class="ph-bold ph-user input-icon"></i>
          <input id="login-input" type="text" placeholder="Digite seu e-mail ou nome de usuário..."
            [ngModel]="loginValue()" (ngModelChange)="loginValue.set($event)" name="loginValue" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password-input">Senha</label>
        <div class="input-wrapper">
          <i class="ph-bold ph-lock input-icon"></i>
          <input id="password-input" [type]="showPassword() ? 'text' : 'password'" placeholder="Digite sua senha..."
            [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" required />
          <button type="button" class="eye-toggle" (click)="toggleShowPassword()" title="Mostrar/ocultar senha">
            <i class="ph-bold" [class.ph-eye]="!showPassword()" [class.ph-eye-slash]="showPassword()"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-submit-btn" [disabled]="loading()">
        <span *ngIf="!loading()">Entrar na Conta</span>
        <span *ngIf="loading()" class="loading-wrap">
          <div class="pokeball-spinner-small"></div> Entrando...
        </span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Ainda não possui uma conta? <a routerLink="/register" class="auth-link">Cadastre-se gratuitamente</a></p>
    </div>
  </div>
</div>
