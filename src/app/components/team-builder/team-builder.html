<div class="placeholder-container">
  <div class="ultra-card">
    <div class="badge-tag">Em Desenvolvimento</div>
    <div class="icon-wrapper">
      <span class="icon">🛡️</span>
    </div>
    <h2>Montador de Times PokéTeam</h2>
    <p>Em breve você poderá selecionar até 6 Pokémon, analisar a cobertura de tipos da sua equipe, fraquezas e montar o time definitivo para batalha!</p>
    <div class="slots-preview">
      <div class="slot" *ngFor="let i of [1,2,3,4,5,6]">
        <span class="slot-num">#{{ i }}</span>
      </div>
    </div>
  </div>
</div>
