<div 
  class="pokemon-card" 
  [ngClass]="'card-type-' + primaryType"
  (click)="onSelect()"
  tabindex="0"
  role="button"
  (keydown.enter)="onSelect()"
  (keydown.space)="onSelect()"
>
  <div class="card-bg-glow"></div>
  <div class="pokeball-watermark">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="8" opacity="0.12"/>
      <path d="M5 50 H95" stroke="currentColor" stroke-width="8" opacity="0.12"/>
      <circle cx="50" cy="50" r="16" fill="var(--bg-card)" stroke="currentColor" stroke-width="8" opacity="0.15"/>
    </svg>
  </div>

  <div class="card-header">
    <span class="pokemon-id">{{ formattedId }}</span>
  </div>

  <div class="card-body">
    <div class="image-wrapper">
      <img [src]="artworkUrl" [alt]="pokemon.name" class="pokemon-img" loading="lazy" />
    </div>

    <h3 class="pokemon-name">{{ pokemon.name }}</h3>

    <div class="type-container">
      <span 
        *ngFor="let t of pokemon.types" 
        class="type-badge" 
        [ngClass]="'type-' + t.type.name"
      >
        {{ t.type.name }}
      </span>
    </div>
  </div>
</div>
